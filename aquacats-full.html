<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaCats Swim School</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--sur:#fff;--s2:#f7f9fc;--bd:#e2e8f0;
  --tx:#1a202c;--t2:#64748b;--t3:#94a3b8;
  --pr:#0ea5e9;--pd:#0284c7;--pl:#e0f2fe;
  --ok:#10b981;--kl:#d1fae5;
  --wn:#f59e0b;--wl:#fef3c7;
  --er:#ef4444;--el:#fee2e2;
  --nv:#0e1f3d;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
input,select,textarea,button{font-family:inherit;font-size:14px}
button{cursor:pointer;border:none}
.app{min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--nv);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.hl{display:flex;align-items:center;gap:10px}
.logo-ph{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-img{width:36px;height:36px;border-radius:6px;object-fit:contain}
.ht{font-weight:700;font-size:16px;color:#fff}
.hs{font-size:12px;color:#90e0ef}
.main{flex:1;padding:16px;max-width:960px;margin:0 auto;width:100%}
.card{background:var(--sur);border-radius:10px;border:1px solid var(--bd);box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:16px;overflow:hidden}
.ch{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ct{font-weight:600;font-size:15px}
.cd{font-size:12px;color:var(--t2);margin-top:2px}
.cb{padding:16px}
.tbr{display:flex;flex-wrap:wrap;gap:4px;background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:4px;margin-bottom:16px}
.tb{flex:1;min-width:52px;padding:6px 5px;border-radius:7px;font-size:11px;font-weight:500;background:transparent;color:var(--t2);border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px}
.tb:hover{background:var(--bg);color:var(--tx)}
.tb.on{background:var(--pr);color:#fff}
.btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:none;transition:all .15s}
.bp{background:var(--pr);color:#fff}.bp:hover{background:var(--pd)}
.bo{background:transparent;border:1px solid var(--bd);color:var(--tx)}.bo:hover{background:var(--bg)}
.bg-btn{background:transparent;color:var(--t2);padding:6px 8px}.bg-btn:hover{background:var(--bg);color:var(--tx)}
.bs{padding:5px 10px;font-size:12px}
.bi{padding:6px;border-radius:7px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bb{background:var(--pl);color:var(--pd)}.bg2{background:var(--kl);color:#065f46}.bw{background:var(--wl);color:#92400e}.br2{background:var(--el);color:#991b1b}.by{background:var(--bg);color:var(--t2)}.bn{background:#1a3a6e;color:#90e0ef}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.inp{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--sur);color:var(--tx);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--pr);box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.sel{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--sur);color:var(--tx);outline:none;appearance:none;cursor:pointer}
.txa{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--sur);color:var(--tx);outline:none;resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.c2{grid-column:span 2}
@media(max-width:500px){.g2,.g3{grid-template-columns:1fr}.c2{grid-column:span 1}}
.ef{background:var(--pl);border:1px solid #bae6fd;border-radius:10px;padding:14px;margin-bottom:10px}
.ea{display:flex;gap:8px;margin-top:12px}
.lr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--s2);border-radius:8px;border:1px solid var(--bd);margin-bottom:6px;gap:8px}
.lm{flex:1;min-width:0}
.ln{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ls{font-size:12px;color:var(--t2);margin-top:1px}
.la{display:flex;gap:4px;flex-shrink:0}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sb{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:12px;text-align:center}
.sv{font-size:24px;font-weight:700}
.sl2{font-size:11px;color:var(--t2);margin-top:2px}
.rh{border-radius:10px;padding:20px;margin-bottom:16px;color:#fff}
.rh h2{font-size:22px;font-weight:700;margin-bottom:4px}
.rh p{font-size:13px;opacity:.8}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:12px}
.rs{background:rgba(255,255,255,.15);border-radius:8px;padding:10px;text-align:center}
.rv{font-size:24px;font-weight:700}
.rl{font-size:10px;opacity:.7;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.emp{text-align:center;padding:32px 16px;color:var(--t2);font-size:13px}
.ei{font-size:32px;margin-bottom:8px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rbt{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.dvd{border:none;border-top:1px solid var(--bd);margin:12px 0}
.tdr{color:var(--er)}
.mn{font-family:monospace}
.sc{max-height:300px;overflow-y:auto}
.stb{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cp{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:2px solid transparent;margin:2px;transition:all .15s}
.cp.on{background:var(--pr);color:#fff;border-color:var(--pr)}
.cp.off{background:var(--s2);color:var(--t2);border-color:var(--bd)}
.als{background:var(--kl);color:#065f46;border:1px solid #a7f3d0;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:10px}
.alw{background:var(--wl);color:#92400e;border:1px solid #fcd34d;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:10px}
.cbx{width:18px;height:18px;border-radius:5px;border:2px solid var(--bd);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;vertical-align:middle;transition:all .15s}
.cbx.on{background:var(--ok);border-color:var(--ok)}
.cr{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:5px;transition:background .12s}
.cr:hover{background:var(--bg)}
.cr.ck{background:var(--kl);border-color:#a7f3d0}
.cr.ck .cr-lbl{text-decoration:line-through;color:var(--t2)}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.ti{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:4px;border:1px solid var(--bd);transition:all .12s}
.t0{background:var(--s2)}.t1{background:#dbeafe;border-color:#93c5fd}.t2{background:var(--wl);border-color:#fcd34d}.t3{background:var(--kl);border-color:#6ee7b7}
.pbw{background:var(--bd);border-radius:10px;height:6px;overflow:hidden}
.pb{height:100%;border-radius:10px;background:var(--pr);transition:width .3s}
.modgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:16px}
.mc{background:#fff;border-radius:12px;border:1px solid var(--bd);overflow:hidden;cursor:pointer;transition:all .2s}
.mc:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.mct{padding:14px 16px;color:#fff;display:flex;align-items:center;gap:10px}
.mcb{padding:12px 16px}
.mcl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.8}
.mctl{font-size:13px;font-weight:700;margin-top:1px}
.qc{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;border:1.5px solid var(--bd);background:var(--s2);cursor:pointer;transition:all .15s}
.qc.qp{background:var(--kl);border-color:#6ee7b7;color:#065f46}
.ob{width:100%;padding:8px;border-radius:8px;border:1px solid var(--bd);background:transparent;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s;margin-top:6px}
.ob:hover{background:var(--pr);color:#fff;border-color:var(--pr)}
.ovb{background:var(--nv);border-radius:10px;padding:14px 16px;margin-bottom:16px;color:#fff}
.ovs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.osv{font-size:22px;font-weight:700}
.osl{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px}
.lwp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0e1f3d,#0a3060 50%,#0e4d3d);padding:20px}
.lwd{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.3);text-align:center}
.pin{width:100%;padding:14px;font-size:22px;letter-spacing:.25em;text-align:center;border:2px solid var(--bd);border-radius:10px;outline:none;transition:border-color .15s;margin-bottom:12px;font-family:monospace}
.pin:focus{border-color:var(--pr)}
.login-btn{width:100%;padding:12px;font-size:15px;font-weight:600;background:var(--pr);color:#fff;border-radius:10px;cursor:pointer;border:none}
.login-btn:hover{background:var(--pd)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0e1f3d,#0a3060)}
.loading-inner{text-align:center;color:#fff}
.spin-lg{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#00b4d8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
.dn{display:flex;gap:6px;align-items:center}
.dn .inp{flex:1}
.saving-toast{position:fixed;bottom:20px;right:20px;background:var(--nv);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;display:none;align-items:center;gap:8px}
.saving-toast.show{display:flex}
</style>
</head>
<body>
<div id="root">
  <div class="loading-screen">
    <div class="loading-inner">
      <div class="spin-lg"></div>
      <div style="font-size:18px;font-weight:700;margin-bottom:6px">AquaCats Swim School</div>
      <div style="font-size:13px;opacity:.7">Loading your data...</div>
    </div>
  </div>
</div>
<div class="saving-toast" id="saving-toast"><span class="spin"></span> Saving...</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, addDoc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBC2Gfi_L2snXvLw0H6-umw-NVnQPNWcmA",
  authDomain: "aquacats.firebaseapp.com",
  projectId: "aquacats",
  storageBucket: "aquacats.firebasestorage.app",
  messagingSenderId: "1074694624746",
  appId: "1:1074694624746:web:d9cddbf04c6e297f64ce93"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PIN = "0000";
const LT = [{id:"private",name:"Private",isGroup:false},{id:"semi",name:"Semi-Private",isGroup:true},{id:"group",name:"Group (3+)",isGroup:true}];
const LVS = ["Level 0","Level 1","Level 2","Level 3","Level 4","Level 5","Level 6","Level 7","Level 8"];
const ACL = [{id:"contract",label:"Signed Contract"},{id:"backgroundCheck",label:"Background Check"},{id:"cpr",label:"CPR Certified"},{id:"equipment",label:"Equipment Issued"},{id:"handbook",label:"Handbook Reviewed"},{id:"orientation",label:"Orientation Complete"}];
const CLS = ["Level 0","Level 1","Level 2","Level 3"];
const TCH = {"Level 0":["Breath Control","Submersion","Front Float","Back Float","Front Glide","Back Glide","Kick on Front","Kick on Back","Roll Over","Wall Grab","Jump In","Assisted Swim"],"Level 1":["Freestyle Arms","Freestyle Breathing","Freestyle Kick","Backstroke Arms","Backstroke Kick","Side Breathing","Treading Water","Deep Water Entry","Surface Dive"],"Level 2":["Freestyle Full Stroke","Backstroke Full Stroke","Breaststroke Kick","Breaststroke Arms","Breaststroke Timing","Elementary Backstroke","Diving","Flip Turn Intro"],"Level 3":["Butterfly Kick","Butterfly Arms","Butterfly Timing","Breaststroke Full","Flip Turns","Open Turns","Racing Starts","IM Order","Endurance Sets"],"General":["Class Management","Parent Communication","Safety Awareness","Lesson Planning","Adapting to Swimmers","Positive Reinforcement","Correcting Form","Time Management","Equipment Use"]};
const TM = [{id:"mod1",label:"Module 1",title:"The Basics of Swimming",icon:"🌊",col:"#0e1f3d",ac:"#00b4d8"},{id:"mod2",label:"Module 2",title:"Classroom & Handling",icon:"📋",col:"#5a3e00",ac:"#c9a227"},{id:"safety",label:"Safety",title:"Safety Module",icon:"🚨",col:"#7a0000",ac:"#e74c3c"},{id:"l0",label:"Level 0",title:"Infant & Toddler Foundations",icon:"🌊",col:"#0a4a3a",ac:"#0a7a6e"},{id:"l1",label:"Level 1",title:"Survival Mastery & SRS",icon:"🌊",col:"#0a2a5a",ac:"#1a6fc4"},{id:"l2",label:"Level 2",title:"SRS Independence & Endurance",icon:"🌊",col:"#3a1a6a",ac:"#5a2d8c"},{id:"l3",label:"Level 3",title:"Breathing Up & Stamina",icon:"🌊",col:"#5a3000",ac:"#e07b00"}];

let staff=[], students=[], sessions=[], trainees=[], settings={};
let cu=null, tab="eod", preview=null;

const uid = () => Math.random().toString(36).slice(2,10);
const gSP = ex => { const u=new Set(ex); let p; do{p=String(Math.floor(1000+Math.random()*3999))}while(u.has(p)||p==="0000"); return p };
const gCP = ex => { const u=new Set(ex); let p; do{p=String(Math.floor(5000+Math.random()*4999))}while(u.has(p)); return p };
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

const showSaving = () => { const t=document.getElementById("saving-toast"); if(t){t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2000);} };

async function fbGet(col_name) {
  const snap = await getDocs(collection(db, col_name));
  return snap.docs.map(d => ({id: d.id, ...d.data()}));
}
async function fbAdd(col_name, data) {
  const ref = await addDoc(collection(db, col_name), {...data, created_at: new Date().toISOString()});
  return {id: ref.id, ...data};
}
async function fbUpdate(col_name, id, data) {
  await updateDoc(doc(db, col_name, id), data);
  showSaving();
}
async function fbDelete(col_name, id) {
  await deleteDoc(doc(db, col_name, id));
}
async function fbSetSetting(key, value) {
  await setDoc(doc(db, "settings", key), {value}, {merge: true});
  settings[key] = value;
}
async function fbGetSettings() {
  const snap = await getDocs(collection(db, "settings"));
  const s = {};
  snap.docs.forEach(d => s[d.id] = d.data().value);
  return s;
}

async function loadAll() {
  try {
    [staff, students, sessions, trainees, settings] = await Promise.all([
      fbGet("staff"), fbGet("students"), fbGet("sessions"), fbGet("trainees"), fbGetSettings()
    ]);
    sessions.sort((a,b) => (a.date||"").localeCompare(b.date||""));
  } catch(e) {
    document.getElementById("root").innerHTML = `<div class="loading-screen"><div class="loading-inner"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="max-width:300px;font-size:15px">Could not connect to database.<br><br>${e.message}</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#0ea5e9;color:#fff;border:none;border-radius:8px;cursor:pointer">Retry</button></div></div>`;
    throw e;
  }
}

await loadAll();
render();

function render() {
  const root = document.getElementById("root");
  if(!cu) { root.innerHTML = loginHTML(); bindLogin(); return; }
  if(cu.type==="trainee") { root.innerHTML = traineeApp(); bindTrainee(); return; }
  if(cu.type==="parent") { root.innerHTML = parentApp(); bindParent(); return; }
  if(cu.type==="coach") { root.innerHTML = coachApp(); bindCoach(); return; }
  if(preview) { root.innerHTML = traineeApp(); bindTrainee(); return; }
  root.innerHTML = adminApp(); bindAdmin();
}

function loginHTML() {
  const logo = settings.logo_url;
  const logoEl = logo ? `<img src="${esc(logo)}" style="width:72px;height:72px;border-radius:12px;object-fit:contain;margin-bottom:12px" onerror="this.style.display='none'">` : `<div style="font-size:52px;margin-bottom:12px">🏊</div>`;
  return `<div class="lwp"><div class="lwd">${logoEl}<h1 style="font-size:22px;font-weight:700;margin-bottom:4px">AquaCats Swim School</h1><p style="font-size:13px;color:var(--t2);margin-bottom:24px">Enter your PIN to continue</p><div id="login-err" style="color:var(--er);font-size:13px;margin-bottom:8px;display:none"></div><input class="pin" id="pin-in" type="password" maxlength="6" placeholder="••••" autocomplete="off"><button class="login-btn" id="login-btn">Login</button><div style="font-size:11px;color:var(--t3);margin-top:12px">Admin: 0000 · Coaches, trainees & parents use assigned PINs</div></div></div>`;
}

function bindLogin() {
  const doLogin = () => {
    const pin = document.getElementById("pin-in").value.trim();
    const errEl = document.getElementById("login-err");
    errEl.style.display = "none";
    if(pin===ADMIN_PIN) { cu={type:"admin"}; tab="eod"; render(); return; }
    const s = staff.find(x=>x.pin===pin);
    if(s) { cu={type:(s.roles?.includes("trainee")&&!s.roles?.includes("coach"))?"trainee":"coach",id:s.id,name:s.name,sd:s}; render(); return; }
    const st = students.find(x=>x.pin===pin);
    if(st) { cu={type:"parent",id:st.id,name:st.parent_name||st.name,pd:st}; render(); return; }
    errEl.textContent="Invalid PIN. Try again."; errEl.style.display="block";
  };
  document.getElementById("login-btn").onclick = doLogin;
  document.getElementById("pin-in").onkeydown = e => { if(e.key==="Enter") doLogin(); };
}

function hdrHTML(title, sub, extra="") {
  const logo = settings.logo_url;
  const logoEl = logo ? `<img src="${esc(logo)}" class="logo-img" onerror="this.style.display='none'">` : `<div class="logo-ph">🏊</div>`;
  return `<div class="hdr"><div class="hl">${logoEl}<div><div class="ht">${esc(title)}</div><div class="hs">${esc(sub)}</div></div></div><div class="row">${extra}<button class="btn bg-btn bi" id="logout-btn" style="color:#90e0ef;font-size:16px" title="Logout">✕</button></div></div>`;
}
function bindLogout(cb) {
  const btn=document.getElementById("logout-btn");
  if(btn) btn.onclick = cb||(()=>{cu=null;preview=null;render();});
}

function tabsHTML(tabs, cur) {
  const ic={eod:"📋",progress:"🏅",makeup:"📅",cert:"🏆",trainee:"🎓",payroll:"💵",renewal:"🔄",roster:"👥"};
  const lb={eod:"EOD",progress:"Progress",makeup:"Makeup",cert:"Certs",trainee:"Trainees",payroll:"Payroll",renewal:"25th",roster:"Roster"};
  return `<div class="tbr">${tabs.map(t=>`<button class="tb${cur===t?" on":""}" data-tab="${t}">${ic[t]||""} <span class="tbl">${lb[t]||t}</span></button>`).join("")}</div>`;
}
function bindTabs(cb) {
  document.querySelectorAll("[data-tab]").forEach(btn=>btn.onclick=()=>{tab=btn.dataset.tab;cb();});
  if(window.innerWidth>=480) document.querySelectorAll(".tbl").forEach(el=>el.style.display="inline");
}

function adminApp() {
  const tabs=["eod","progress","makeup","cert","trainee","payroll","renewal","roster"];
  return `<div class="app">${hdrHTML("AquaCats","Administrator")}<main class="main">${tabsHTML(tabs,tab)}${tabContent(tab)}</main></div>`;
}
function bindAdmin() { bindLogout(); bindTabs(()=>render()); bindTabContent(tab); }

function coachApp() {
  const ms=students.filter(s=>s.coach_ids?.includes(cu.id));
  const today=new Date().toISOString().split("T")[0];
  const tc=sessions.filter(s=>s.coach_id===cu.id&&s.date===today).length;
  const mk=ms.reduce((sum,s)=>sum+(s.makeup_units||0),0);
  const isTr=cu.sd?.roles?.includes("trainer");
  const tabs=isTr?["eod","progress","makeup","cert","trainee"]:["eod","progress","makeup","cert"];

    const infoEdit=ttEI?`<div class="ef" style="margin-bottom:12px"><div class="g2"><div class="fld"><label>Name</label><input class="inp" id="tt-ei-n" value="esc(ttIFm.name∣∣"")"></div><divclass="fld"><label>StartDate</label><inputclass="inp"type="date"id="tt−ei−d"value="{esc(ttIFm.name||"")}"></div><div class="fld"><label>Start Date</label><input class="inp" type="date" id="tt-ei-d" value="
esc(ttIFm.name∣∣"")"></div><divclass="fld"><label>StartDate</label><inputclass="inp"type="date"id="tt−ei−d"value="{esc(ttIFm.start_date||"")}"></div></div></div>`:"";
    const secContent=ttSec==="admin"?ACL.map(item=>{const ck=sel.progress_data?.adminChecklist?.[item.id]||false;return`<div class="crck?"ck":"""data−acl="{ck?" ck":""}" data-acl="
ck?"ck":"""data−acl="{item.id}"><div class="cbxck?"on":"""></div><spanclass="cr−lbl">{ck?" on":""}"></div><span class="cr-lbl">
ck?"on":"""></div><spanclass="cr−lbl">{item.label}</span></div>`;}).join(""):ttSec==="curriculum"?CLS.map(lv=>`<div style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:6px">lv</div><divclass="g3">{lv}</div><div class="g3">
lv</div><divclass="g3">{[{id:"readCurriculum",l:"Read"},{id:"passedQuiz",l:"Quiz"},{id:"passedVerbal",l:"Verbal"}].map(item=>{const ck=sel.progress_data?.curriculum?.[lv]?.[item.id]||false;return`<div class="crck?"ck":"""data−cur="{ck?" ck":""}" data-cur="
ck?"ck":"""data−cur="{lv}|item.id"><divclass="cbx{item.id}"><div class="cbx
item.id"><divclass="cbx{ck?" on":""}"></div><span class="cr-lbl" style="font-size:12px">{item.l}</span></div>`;}).join("")}</div></div>`).join(""):`<div><div class="stb" style="margin-bottom:10px">
{[...CLS,"General"].map(l=>`<button class="cp ttLvl===l?"on":"off""data−ttlv="{ttLvl===l?"on":"off"}" data-ttlv="
ttLvl===l?"on":"off""data−ttlv="{l}">{l}</button>`).join("")}</div><div style="font-size:11px;color:var(--t2);margin-bottom:8px">○ Not · 👁 Watched · 💪 Practiced · ✅ Mastered — tap to cycle</div><div class="tg">
{(TCH[ttLvl]||[]).map(tech=>{const s=sel.progress_data?.techniques?.[tech]||"none";const cls={none:"t0",watched:"t1",practiced:"t2",mastered:"t3"}[s];const ic=s==="watched"?"👁":s==="practiced"?"💪":s==="mastered"?"✅":"○";return`<div class="ti cls"data−tech="{cls}" data-tech="
cls"data−tech="{esc(tech)}">esc(tech)<span>{esc(tech)} <span>
esc(tech)<span>{ic}</span></div>`;}).join("")}</div></div>`;
    detail=`<div class="card"><div class="ch"><div><div class="ct">esc(sel.name)</div><divclass="cd">{esc(sel.name)}</div><div class="cd">
esc(sel.name)</div><divclass="cd">{sel.promoted?"✓ Promoted "+esc(sel.promoted_date):"Started "+esc(sel.start_date)}</div></div><div class="row">{!sel.promoted?`<button class="btn bs" style="background:var(--ok);color:#fff" id="tt-promote">🎓 Promote to Coach</button>`:""} ${!sel.promoted&&!ttEI?`<button class="btn bo bs" id="tt-ei">✏️</button>`:""} ${ttEI?`<div class="row"><button class="btn bp bs" id="tt-ei-save">💾</button><button class="btn bo bs" id="tt-ei-cancel">✕</button></div>`:""}</div></div><div class="cb">
{infoEdit}mpPanel<divclass="stb">{mpPanel}<div class="stb">
mpPanel<divclass="stb">{["admin","curriculum","techniques"].map(s=>`<button class="cp ttSec===s?"on":"off""data−tts2="{ttSec===s?"on":"off"}" data-tts2="
ttSec===s?"on":"off""data−tts2="{s}">{s==="admin"?"Admin Checklist":s==="curriculum"?"Curriculum":"Techniques"}</button>`).join("")}</div>
{secContent}<div class="dvd"></div><div class="fld"><label>Notes</label><textarea class="txa" rows="3" id="tt-notes">${esc(sel.notes||"")}</textarea></div></div></div>`;
  }
  return `<div class="card"><div class="ch"><div class="ct">Trainee Tracker</div><button class="btn bp bs" id="tt-add">+ Add</button></div><div class="cb">addForm{addForm}
addForm{trainees.length===0&&!ttAdd?`<div class="emp"><div class="ei">🎓</div>No trainees yet</div>`:""}<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px">cards</div></div></div>{cards}</div></div></div>
cards</div></div></div>{detail}`;
}
function bindTraineeTab(){
  document.getElementById("tt-add").onclick=()=>{ttAdd=true;ttNN="";render();};
  if(document.getElementById("tt-add-ok")){document.getElementById("tt-add-ok").onclick=async()=>{const nm=(document.getElementById("tt-nn")?.value||"").trim();if(!nm)return;const btn=document.getElementById("tt-add-ok");btn.disabled=true;btn.innerHTML=`<span class="spin"></span>`;const data={name:nm,start_date:new Date().toISOString().split("T")[0],notes:"",progress_data:{adminChecklist:{},curriculum:{},techniques:{}},module_progress:{},promoted:false,promoted_date:""};const ns=await fbAdd("trainees",data);trainees.push(ns);ttAdd=false;ttNN="";ttSel=ns.id;ttSec="admin";render();};document.getElementById("tt-add-no").onclick=()=>{ttAdd=false;render();};document.getElementById("tt-nn").oninput=e=>{ttNN=e.target.value;};document.getElementById("tt-nn").onkeydown=e=>{if(e.key==="Enter")document.getElementById("tt-add-ok").click();};}
  document.querySelectorAll("[data-tts]").forEach(el=>el.onclick=e=>{if(e.target.closest("button"))return;ttSel=el.dataset.tts;ttSec="admin";ttEI=false;render();});
  document.querySelectorAll("[data-ttd]").forEach(btn=>btn.onclick=async e=>{e.stopPropagation();if(!confirm("Delete trainee?"))return;await fbDelete("trainees",btn.dataset.ttd);trainees=trainees.filter(t=>t.id!==btn.dataset.ttd);if(ttSel===btn.dataset.ttd)ttSel=null;render();});
  document.querySelectorAll("[data-ttp]").forEach(btn=>btn.onclick=e=>{e.stopPropagation();const t=trainees.find(x=>x.id===btn.dataset.ttp);if(t){preview={name:t.name};render();}});
  const sel=trainees.find(t=>t.id===ttSel)||null;
  if(!sel)return;
  if(document.getElementById("tt-promote")) document.getElementById("tt-promote").onclick=async()=>{if(!confirm("Promote "+sel.name+" to Coach?"))return;const s=staff.find(x=>x.name===sel.name);if(s){s.roles=[...(s.roles||[]).filter(r=>r!=="trainee"),"coach"];await fbUpdate("staff",s.id,{roles:s.roles});}sel.promoted=true;sel.promoted_date=new Date().toISOString().split("T")[0];await fbUpdate("trainees",sel.id,{promoted:true,promoted_date:sel.promoted_date});ttSel=null;render();};
  if(document.getElementById("tt-ei")) document.getElementById("tt-ei").onclick=()=>{ttIFm={name:sel.name,start_date:sel.start_date};ttEI=true;render();};
  if(document.getElementById("tt-ei-save")) document.getElementById("tt-ei-save").onclick=async()=>{sel.name=document.getElementById("tt-ei-n").value;sel.start_date=document.getElementById("tt-ei-d").value;await fbUpdate("trainees",sel.id,{name:sel.name,start_date:sel.start_date});ttEI=false;render();};
  if(document.getElementById("tt-ei-cancel")) document.getElementById("tt-ei-cancel").onclick=()=>{ttEI=false;render();};
  document.querySelectorAll("[data-tts2]").forEach(btn=>btn.onclick=()=>{ttSec=btn.dataset.tts2;render();});
  document.querySelectorAll("[data-ttlv]").forEach(btn=>btn.onclick=()=>{ttLvl=btn.dataset.ttlv;render();});
  document.querySelectorAll("[data-acl]").forEach(el=>el.onclick=async()=>{const id=el.dataset.acl;sel.progress_data.adminChecklist={...sel.progress_data?.adminChecklist,[id]:!sel.progress_data?.adminChecklist?.[id]};await fbUpdate("trainees",sel.id,{progress_data:sel.progress_data});render();});
  document.querySelectorAll("[data-cur]").forEach(el=>el.onclick=async()=>{const[lv,f]=el.dataset.cur.split("|");sel.progress_data.curriculum=sel.progress_data.curriculum||{};sel.progress_data.curriculum[lv]=sel.progress_data.curriculum[lv]||{};sel.progress_data.curriculum[lv][f]=!sel.progress_data.curriculum[lv][f];await fbUpdate("trainees",sel.id,{progress_data:sel.progress_data});render();});
  document.querySelectorAll("[data-tech]").forEach(el=>el.onclick=async()=>{const tech=el.dataset.tech;const st=["none","watched","practiced","mastered"];const cur=sel.progress_data?.techniques?.[tech]||"none";const nx=st[(st.indexOf(cur)+1)%st.length];sel.progress_data.techniques={...sel.progress_data?.techniques,[tech]:nx};await fbUpdate("trainees",sel.id,{progress_data:sel.progress_data});render();});
  if(document.getElementById("tt-notes")) document.getElementById("tt-notes").onchange=async e=>{sel.notes=e.target.value;await fbUpdate("trainees",sel.id,{notes:sel.notes});};
}
</script>
