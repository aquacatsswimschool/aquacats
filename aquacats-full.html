      <div class="fld"><label>Private Rate</label><input class="inp" type="number" id="sf-pr" value="${rFm.private_rate||25}"></div>
      <div class="fld"><label>Group Rate</label><input class="inp" type="number" id="sf-gr" value="${rFm.group_rate||20}"></div>
      <div class="fld"><label>Sub Rate</label><input class="inp" type="number" id="sf-sr" value="${rFm.sub_rate||25}"></div>
      <div class="fld c2"><label>Roles</label><div class="row">${["coach","trainee","trainer"].map(r=>`<button class="cp ${(rFm.roles||[]).includes(r)?"on":"off"}" data-role="${r}">${r}</button>`).join("")}</div></div>
    </div>
    <div class="ea"><button class="btn bp bs" id="sf-save">💾 Save</button><button class="btn bo bs" id="sf-cancel">✕ Cancel</button></div>
  </div>`:"";
  return `<div class="card"><div class="ch"><div class="ct">Staff</div><button class="btn bp bs" id="add-sta">+ Add Staff</button></div><div class="cb">
    ${form}
    ${staff.length===0&&!rAdd?`<div class="emp"><div class="ei">👤</div>No staff yet.</div>`:""}
    ${staff.filter(s=>rEditId!==s.id).map(s=>`<div class="lr"><div class="lm"><div class="ln">${esc(s.name)}</div><div class="ls">PIN: <span class="mn">${esc(s.pin)}</span> · $${s.private_rate}/$${s.group_rate} · ${esc(s.roles?.join(", ")||"")}</div></div><div class="la"><span class="bge bn">${esc(s.roles?.[0]||"")}</span><button class="btn bg-btn bi bs" data-edit-sta="${s.id}">✏️</button><button class="btn bg-btn bi bs tdr" data-del-sta="${s.id}">🗑</button></div></div>`).join("")}
  </div></div>`;
}

function bindRoster(){
  // Settings
  if(document.getElementById("set-url-save"))document.getElementById("set-url-save").onclick=async()=>{const v=document.getElementById("set-url").value.trim();settings.portal_url=v;await dbUpsertSetting("portal_url",v);render();};
  if(document.getElementById("set-logo-save"))document.getElementById("set-logo-save").onclick=async()=>{const v=document.getElementById("set-logo").value.trim();settings.logo_url=v;await dbUpsertSetting("logo_url",v);render();};
  // View toggle
  document.getElementById("rv-stu").onclick=()=>{rView="students";rEditId=null;rAdd=false;render();};
  document.getElementById("rv-sta").onclick=()=>{rView="staff";rEditId=null;rAdd=false;render();};
  if(document.getElementById("r-search"))document.getElementById("r-search").oninput=e=>{rSearch=e.target.value;render();};

  if(rView==="students"){
    if(document.getElementById("add-stu"))document.getElementById("add-stu").onclick=()=>{rFm={pin:gCP(students.map(s=>s.pin)),level:"Level 0",lesson_type_id:"private",frequency:1,subscription_status:"Active",subscription_units:4,makeup_units:0,coach_ids:[]};rAdd=true;rEditId=null;render();};
    document.querySelectorAll("[data-edit-s]").forEach(btn=>btn.onclick=()=>{const s=students.find(x=>x.id===btn.dataset.editS);if(!s)return;rFm={...s,coach_ids:[...(s.coach_ids||[])]};rEditId=s.id;rAdd=false;render();});
    document.querySelectorAll("[data-del-s]").forEach(btn=>btn.onclick=async()=>{if(!confirm("Delete student?"))return;await dbDelete("students",btn.dataset.delS);students=students.filter(s=>s.id!==btn.dataset.delS);render();});
    document.querySelectorAll("[data-rc]").forEach(btn=>btn.onclick=()=>{const id=btn.dataset.rc;const on=(rFm.coach_ids||[]).includes(id);rFm.coach_ids=on?rFm.coach_ids.filter(i=>i!==id):[...(rFm.coach_ids||[]),id];btn.className="cp "+(on?"off":"on");});
    if(document.getElementById("rf-save"))document.getElementById("rf-save").onclick=async()=>{
      const fm=getStuFm();if(!fm.name)return;
      const btn=document.getElementById("rf-save");btn.disabled=true;btn.innerHTML=`<span class="spin"></span>`;
      if(rEditId){const saved=await dbUpdate("students",rEditId,fm);Object.assign(students.find(s=>s.id===rEditId),fm);}
      else{const saved=await dbInsert("students",[fm]);students.push(...saved);}
      rEditId=null;rAdd=false;render();
    };
    if(document.getElementById("rf-cancel"))document.getElementById("rf-cancel").onclick=()=>{rEditId=null;rAdd=false;render();};
  }else{
    if(document.getElementById("add-sta"))document.getElementById("add-sta").onclick=()=>{rFm={pin:gSP(staff.map(s=>s.pin)),private_rate:25,group_rate:20,sub_rate:25,roles:["coach"],cert_data:{}};rAdd=true;rEditId=null;render();};
    document.querySelectorAll("[data-edit-sta]").forEach(btn=>btn.onclick=()=>{const s=staff.find(x=>x.id===btn.dataset.editSta);if(!s)return;rFm={...s,roles:[...(s.roles||[])]};rEditId=s.id;rAdd=false;render();});
    document.querySelectorAll("[data-del-sta]").forEach(btn=>btn.onclick=async()=>{if(!confirm("Delete staff member?"))return;await dbDelete("staff",btn.dataset.delSta);staff=staff.filter(s=>s.id!==btn.dataset.delSta);render();});
    document.querySelectorAll("[data-role]").forEach(btn=>btn.onclick=()=>{const r=btn.dataset.role;const on=(rFm.roles||[]).includes(r);rFm.roles=on?rFm.roles.filter(x=>x!==r):[...(rFm.roles||[]),r];btn.className="cp "+(on?"off":"on");});
    if(document.getElementById("sf-save"))document.getElementById("sf-save").onclick=async()=>{
      const nm=document.getElementById("sf-name")?.value;if(!nm)return;
      const fm={name:nm,pin:document.getElementById("sf-pin")?.value,private_rate:+document.getElementById("sf-pr")?.value,group_rate:+document.getElementById("sf-gr")?.value,sub_rate:+document.getElementById("sf-sr")?.value,roles:rFm.roles||["coach"],cert_data:rFm.cert_data||{}};
      const btn=document.getElementById("sf-save");btn.disabled=true;btn.innerHTML=`<span class="spin"></span>`;
      if(rEditId){await dbUpdate("staff",rEditId,fm);Object.assign(staff.find(s=>s.id===rEditId),fm);}
      else{const saved=await dbInsert("staff",[fm]);staff.push(...saved);}
      rEditId=null;rAdd=false;render();
    };
    if(document.getElementById("sf-cancel"))document.getElementById("sf-cancel").onclick=()=>{rEditId=null;rAdd=false;render();};
  }
}

// ── Trainee Tab ───────────────────────────────────────────────────────────────
let ttSel=null,ttSec="admin",ttLvl="Level 0",ttEI=false,ttIFm={},ttAdd=false,ttNN="";
function traineeTabHTML(){
  const gA=t=>{const cl=t.progress_data?.adminChecklist||{};return Math.round(ACL.filter(i=>cl[i.id]).length/ACL.length*100)};
  const gT=t=>{const tc=t.progress_data?.techniques||{};const all=Object.values(TCH).flat();return Math.round(all.filter(x=>tc[x]==="mastered").length/all.length*100)};
  const gM=t=>{const mp=t.module_progress||{};return Math.round(TM.filter(m=>mp[m.id]?.quizPassed).length/TM.length*100)};
  const sel=trainees.find(t=>t.id===ttSel)||null;
  const addForm=ttAdd?`<div class="ef" style="margin-bottom:10px"><div class="fld"><label>Trainee Name</label><input class="inp" id="tt-nn" value="${esc(ttNN)}" placeholder="Full name..." autofocus></div><div class="ea"><button class="btn bp bs" id="tt-add-ok">💾 Add</button><button class="btn bo bs" id="tt-add-no">✕</button></div></div>`:"";
  const cards=trainees.map(t=>`<div class="lr" style="cursor:pointer;flex-direction:column;align-items:flex-start;background:${ttSel===t.id?"var(--pl)":t.promoted?"var(--kl)":""};border:1px solid ${ttSel===t.id?"var(--pr)":t.promoted?"#6ee7b7":"var(--bd)"}" data-tt-sel="${t.id}">
    <div class="rbt" style="width:100%;margin-bottom:6px">
      <span style="font-weight:600">${esc(t.name)}${t.promoted?`<span style="font-size:10px;color:var(--ok);margin-left:4px">✓ Coach</span>`:""}</span>
      <div class="row">
        ${!t.promoted?`<button class="btn bg-btn bi bs" style="color:var(--pr)" data-tt-prev="${t.id}" title="Preview POV">👁</button>`:""}
        ${!t.promoted?`<button class="btn bg-btn bi bs tdr" data-tt-del="${t.id}">🗑</button>`:""}
      </div>
    </div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:6px">${t.promoted?"Promoted "+esc(t.promoted_date):"Started "+esc(t.start_date)}</div>
    <div class="row" style="gap:4px;flex-wrap:wrap"><span class="bge bb">Admin ${gA(t)}%</span><span class="bge bg2">Skills ${gT(t)}%</span><span class="bge bn">Modules ${gM(t)}%</span></div>
  </div>`).join("");

  let detail="";
  if(sel){
    const mpPanel=`<div style="background:var(--nv);border-radius:8px;padding:10px 14px;margin-bottom:12px;color:#fff">
      <div style="font-size:11px;color:#90e0ef;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Module Progress</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px">
        ${TM.map(m=>{const mp=sel.module_progress||{};const p=mp[m.id]||{};return`<div style="background:rgba(255,255,255,.08);border-radius:6px;padding:5px 8px"><div style="font-size:10px;color:rgba(255,255,255,.6)">${m.label}</div><div style="font-size:11px;margin-top:1px">${p.quizPassed?"✅ Passed":p.read?"📖 Read":"⬜ Not started"}</div></div>`;}).join("")}
      </div></div>`;
    const infoEdit=ttEI?`<div class="ef" style="margin-bottom:12px"><div class="g2"><div class="fld"><label>Name</label><input class="inp" id="tt-ei-n" value="${esc(ttIFm.name||"")}"></div><div class="fld"><label>Start Date</label><input class="inp" type="date" id="tt-ei-d" value="${esc(ttIFm.start_date||"")}"></div></div></div>`:"";
    const secContent=ttSec==="admin"?ACL.map(item=>{const ck=sel.progress_data?.adminChecklist?.[item.id]||false;return`<div class="cr${ck?" ck":""}" data-tt-acl="${item.id}"><div class="cbx${ck?" on":""}"></div><span class="cr-lbl">${item.label}</span></div>`;}).join(""):
    ttSec==="curriculum"?CLS.map(lv=>`<div style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:6px">${lv}</div><div class="g3">${[{id:"readCurriculum",l:"Read"},{id:"passedQuiz",l:"Quiz"},{id:"passedVerbal",l:"Verbal"}].map(item=>{const ck=sel.progress_data?.curriculum?.[lv]?.[item.id]||false;return`<div class="cr${ck?" ck":""}" data-tt-cur="${lv}|${item.id}"><div class="cbx${ck?" on":""}"></div><span class="cr-lbl" style="font-size:12px">${item.l}</span></div>`;}).join("")}</div></div>`).join(""):
    `<div><div class="stb" style="margin-bottom:10px">${[...CLS,"General"].map(l=>`<button class="cp ${ttLvl===l?"on":"off"}" data-tt-lvl="${l}">${l}</button>`).join("")}</div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:8px">○ Not · 👁 Watched · 💪 Practiced · ✅ Mastered — tap to cycle</div>
    <div class="tg">${(TCH[ttLvl]||[]).map(tech=>{const s=sel.progress_data?.techniques?.[tech]||"none";const cls={none:"t0",watched:"t1",practiced:"t2",mastered:"t3"}[s];const ic=s==="watched"?"👁":s==="practiced"?"💪":s==="mastered"?"✅":"○";return`<div class="ti ${cls}" data-tt-tech="${esc(tech)}">${esc(tech)} <span>${ic}</span></div>`;}).join("")}</div></div>`;

    detail=`<div class="card"><div class="ch">
      <div><div class="ct">${esc(sel.name)}</div><div class="cd">${sel.promoted?"✓ Promoted "+esc(sel.promoted_date):"Started "+esc(sel.start_date)}</div></div>
      <div class="row">
        ${!sel.promoted?`<button class="btn bs" style="background:var(--ok);color:#fff" id="tt-promote">🎓 Promote to Coach</button>`:""}
        ${!sel.promoted&&!ttEI?`<button class="btn bo bs" id="tt-ei">✏️</button>`:""}
        ${ttEI?`<div class="row"><button class="btn bp bs" id="tt-ei-save">💾</button><button class="btn bo bs" id="tt-ei-cancel">✕</button></div>`:""}
      </div>
    </div><div class="cb">
      ${infoEdit}${mpPanel}
      <div class="stb">${["admin","curriculum","techniques"].map(s=>`<button class="cp ${ttSec===s?"on":"off"}" data-tt-sec="${s}">${s==="admin"?"Admin Checklist":s==="curriculum"?"Curriculum":"Techniques"}</button>`).join("")}</div>
      ${secContent}
      <div class="dvd"></div>
      <div class="fld"><label>Notes</label><textarea class="txa" rows="3" id="tt-notes" placeholder="Notes…">${esc(sel.notes||"")}</textarea></div>
    </div></div>`;
  }
  return `<div class="card"><div class="ch"><div class="ct">Trainee Tracker</div><button class="btn bp bs" id="tt-add-btn">+ Add</button></div><div class="cb">
    ${addForm}${trainees.length===0&&!ttAdd?`<div class="emp"><div class="ei">🎓</div>No trainees yet</div>`:""}
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px">${cards}</div>
  </div></div>${detail}`;
}

async function updateTraineeProgress(t) {
  await dbUpdate("trainees",t.id,{progress_data:t.progress_data,notes:t.notes||""});
}

function bindTraineeTab(){
  document.getElementById("tt-add-btn").onclick=()=>{ttAdd=true;ttNN="";render();};
  if(document.getElementById("tt-add-ok")){
    document.getElementById("tt-add-ok").onclick=async()=>{
      const nm=(document.getElementById("tt-nn")?.value||"").trim();if(!nm)return;
      const btn=document.getElementById("tt-add-ok");btn.disabled=true;btn.innerHTML=`<span class="spin"></span>`;
      const data={name:nm,start_date:new Date().toISOString().split("T")[0],notes:"",progress_data:{adminChecklist:{},curriculum:{},techniques:{}},module_progress:{},promoted:false,promoted_date:""};
      const saved=await dbInsert("trainees",[data]);
      trainees.push(...saved);ttAdd=false;ttNN="";ttSel=saved[0]?.id;ttSec="admin";render();
    };
    document.getElementById("tt-add-no").onclick=()=>{ttAdd=false;render();};
    document.getElementById("tt-nn").oninput=e=>{ttNN=e.target.value;};
    document.getElementById("tt-nn").onkeydown=e=>{if(e.key==="Enter")document.getElementById("tt-add-ok").click();};
  }
  document.querySelectorAll("[data-tt-sel]").forEach(el=>el.onclick=e=>{if(e.target.closest("button"))return;ttSel=el.dataset.ttSel;ttSec="admin";ttEI=false;render();});
  document.querySelectorAll("[data-tt-del]").forEach(btn=>btn.onclick=async e=>{e.stopPropagation();if(!confirm("Delete trainee?"))return;await dbDelete("trainees",btn.dataset.ttDel);trainees=trainees.filter(t=>t.id!==btn.dataset.ttDel);if(ttSel===btn.dataset.ttDel)ttSel=null;render();});
  document.querySelectorAll("[data-tt-prev]").forEach(btn=>btn.onclick=async e=>{e.stopPropagation();const t=trainees.find(x=>x.id===btn.dataset.ttPrev);if(t){preview={name:t.name};render();}});
  const sel=trainees.find(t=>t.id===ttSel)||null;
  if(!sel)return;
  if(document.getElementById("tt-promote"))document.getElementById("tt-promote").onclick=async()=>{
    if(!confirm("Promote "+sel.name+" to Coach?"))return;
    const s=staff.find(x=>x.name===sel.name);
    if(s){s.roles=[...(s.roles||[]).filter(r=>r!=="trainee"),"coach"];await dbUpdate("staff",s.id,{roles:s.roles});}
    sel.promoted=true;sel.promoted_date=new Date().toISOString().split("T")[0];
    await dbUpdate("trainees",sel.id,{promoted:true,promoted_date:sel.promoted_date});
    ttSel=null;render();
  };
  if(document.getElementById("tt-ei"))document.getElementById("tt-ei").onclick=()=>{ttIFm={name:sel.name,start_date:sel.start_date};ttEI=true;render();};
  if(document.getElementById("tt-ei-save"))document.getElementById("tt-ei-save").onclick=async()=>{sel.name=document.getElementById("tt-ei-n").value;sel.start_date=document.getElementById("tt-ei-d").value;await dbUpdate("trainees",sel.id,{name:sel.name,start_date:sel.start_date});ttEI=false;render();};
  if(document.getElementById("tt-ei-cancel"))document.getElementById("tt-ei-cancel").onclick=()=>{ttEI=false;render();};
  document.querySelectorAll("[data-tt-sec]").forEach(btn=>btn.onclick=()=>{ttSec=btn.dataset.ttSec;render();});
  document.querySelectorAll("[data-tt-lvl]").forEach(btn=>btn.onclick=()=>{ttLvl=btn.dataset.ttLvl;render();});
  document.querySelectorAll("[data-tt-acl]").forEach(el=>el.onclick=async()=>{
    const id=el.dataset.ttAcl;sel.progress_data.adminChecklist={...sel.progress_data?.adminChecklist,[id]:!sel.progress_data?.adminChecklist?.[id]};
    await updateTraineeProgress(sel);render();
  });
  document.querySelectorAll("[data-tt-cur]").forEach(el=>el.onclick=async()=>{
    const[lv,f]=el.dataset.ttCur.split("|");sel.progress_data.curriculum=sel.progress_data.curriculum||{};sel.progress_data.curriculum[lv]=sel.progress_data.curriculum[lv]||{};sel.progress_data.curriculum[lv][f]=!sel.progress_data.curriculum[lv][f];
    await updateTraineeProgress(sel);render();
  });
  document.querySelectorAll("[data-tt-tech]").forEach(el=>el.onclick=async()=>{
    const tech=el.dataset.ttTech;const st=["none","watched","practiced","mastered"];const cur=sel.progress_data?.techniques?.[tech]||"none";const nx=st[(st.indexOf(cur)+1)%st.length];sel.progress_data.techniques={...sel.progress_data?.techniques,[tech]:nx};
    await updateTraineeProgress(sel);render();
  });
  if(document.getElementById("tt-notes"))document.getElementById("tt-notes").onchange=async e=>{sel.notes=e.target.value;await dbUpdate("trainees",sel.id,{notes:sel.notes});};
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
